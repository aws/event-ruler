# Builds, signs, and uploads a release to the Maven Central Publisher Portal.
#
# Triggers:
#   - Pushing a tag v* (normal releases; the tag must carry the Central
#     Portal publishing config in pom.xml).
#   - Manual dispatch with a ref input (backfills: point it at a publish-X
#     branch created from an older tag plus the publishing config).
#
# autoPublish is off in pom.xml: a successful run leaves a VALIDATED
# deployment in the Portal (https://central.sonatype.com -> Deployments),
# which a maintainer reviews and publishes from the UI.
#
# The run is gated on the CI workflow (CI.yml) having a successful run for
# the exact commit being released: pushes to main trigger CI, so a tag on
# main is covered. If CI is still queued or running for the commit, the gate
# waits for it (up to 60 minutes) instead of failing. It fails fast when CI
# concluded without success. For backfill refs that predate CI coverage,
# dispatch with skip_ci_gate set to true.
#
# Required repository secrets:
#   CENTRAL_TOKEN_USERNAME / CENTRAL_TOKEN_PASSWORD - Central Portal user
#     token generated by the EventRuler publisher account.
#   GPG_PRIVATE_KEY - ASCII-armored private signing key
#     (AWS Event Ruler <event-ruler@amazon.com>).
#   GPG_PASSPHRASE - passphrase for that key.
name: Release to Maven Central

permissions:
  contents: read
  actions: read

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to build and deploy (must contain the Central Portal publishing config)"
        required: true
        type: string
      skip_ci_gate:
        description: "Skip the CI-green gate (only for backfill refs where CI never ran)"
        required: false
        type: boolean
        default: false

concurrency:
  group: maven-central-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: "corretto"
          java-version: "8"
          cache: "maven"
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Verify CI passed for this commit
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_ci_gate) }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="$(git rev-parse HEAD)"
          DEADLINE="$((SECONDS + 60 * 60))"
          while :; do
            RUNS="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/CI.yml/runs?head_sha=${SHA}&per_page=100" \
              --jq '[.workflow_runs[] | {status, conclusion}]')"
            SUCCESSES="$(echo "$RUNS" | jq '[.[] | select(.conclusion == "success")] | length')"
            PENDING="$(echo "$RUNS" | jq '[.[] | select(.status != "completed")] | length')"
            TOTAL="$(echo "$RUNS" | jq 'length')"
            if [ "$SUCCESSES" -gt 0 ]; then
              echo "CI passed for ${SHA} (${SUCCESSES} successful run(s))."
              break
            fi
            if [ "$TOTAL" -gt 0 ] && [ "$PENDING" -eq 0 ]; then
              echo "CI (Java Build) concluded without success for ${SHA}." >&2
              echo "Fix CI, then re-run this workflow. For backfill refs that never ran CI, dispatch with skip_ci_gate=true." >&2
              exit 1
            fi
            if [ "$SECONDS" -ge "$DEADLINE" ]; then
              echo "Timed out waiting for a successful CI (Java Build) run for ${SHA}." >&2
              echo "For backfill refs that never ran CI, dispatch with skip_ci_gate=true." >&2
              exit 1
            fi
            echo "Waiting for CI on ${SHA} (${TOTAL} run(s), ${PENDING} pending)..."
            sleep 60
          done

      - name: Verify pom version matches tag
        if: github.ref_type == 'tag'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          POM_VERSION="$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)"
          if [ "$TAG_VERSION" != "$POM_VERSION" ]; then
            echo "Tag version v$TAG_VERSION does not match pom version $POM_VERSION" >&2
            exit 1
          fi

      - name: Build, sign, and upload to Central Portal
        run: mvn --batch-mode --errors -P publishing clean deploy
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
